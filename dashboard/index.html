<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROA OCR</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-base: #0f172a;
      --bg-surface: #1e293b;
      --bg-card: #334155;
      --border-color: #475569;
      --accent-blue: #2563eb;
      --accent-emerald: #10b981;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --font-main: 'Inter', sans-serif;
      --font-code: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .status-badge {
      font-size: 12px; font-weight: 500;
      color: var(--accent-emerald);
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      padding: 4px 10px; border-radius: 4px;
    }

    main {
      max-width: 800px;
      width: 100%;
      margin: 40px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .intent-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .intent-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px 12px;
      cursor: pointer;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s ease;
    }
    .intent-card:hover {
      border-color: var(--accent-blue);
    }
    .intent-card.selected {
      border-color: var(--accent-blue);
      background: rgba(37, 99, 235, 0.15);
      color: #fff;
    }

    .dropzone {
      background: var(--bg-surface);
      border: 2px dashed var(--border-color);
      border-radius: 8px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: var(--accent-blue);
    }
    .dropzone-text { font-size: 14px; font-weight: 600; }
    .dropzone-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    details.config-advanced {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 14px 16px;
    }
    details.config-advanced summary {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .config-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border-color);
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .form-control {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
    }

    .btn-action {
      background: var(--accent-blue);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
    }
    .btn-action:hover { background: #1d4ed8; }

    .result-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      display: none;
    }
    .result-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .result-title { font-size: 14px; font-weight: 600; }
    .result-box {
      background: var(--bg-base);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 14px;
      max-height: 360px;
      overflow-y: auto;
      font-family: var(--font-code);
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      margin-bottom: 12px;
    }
    .action-row { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-sm {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
    }
    .btn-sm:hover { background: var(--border-color); }
  </style>
</head>
<body>

  <header>
    <div class="brand-title">ROA OCR</div>
    <span class="status-badge">En línea</span>
  </header>

  <main>
    <section>
      <div class="section-label">Operación</div>
      <div class="intent-grid">
        <div class="intent-card selected" onclick="selectIntent('markdown', this)">Markdown</div>
        <div class="intent-card" onclick="selectIntent('chunks', this)">RAG Chunks</div>
        <div class="intent-card" onclick="selectIntent('pdf', this)">PDF Buscable</div>
        <div class="intent-card" onclick="selectIntent('compress', this)">Comprimir</div>
      </div>
    </section>

    <section>
      <div class="section-label">Documento</div>
      <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
        <div class="dropzone-text" id="file-label">Arrastra o selecciona un archivo</div>
        <div class="dropzone-sub">PDF, PNG, JPG, TIFF, BMP</div>
      </div>
      <input type="file" id="file-input" style="display:none;" accept=".pdf,.png,.jpg,.jpeg,.bmp,.tiff">
    </section>

    <details class="config-advanced">
      <summary>Configuración avanzada</summary>
      <div class="config-grid">
        <div class="form-group">
          <label>Motor</label>
          <select class="form-control" id="cfg-engine">
            <option value="auto">Automático</option>
            <option value="er296">ER296 Nativo</option>
            <option value="ocrmypdf">OCRmyPDF</option>
            <option value="tesseract">Tesseract</option>
          </select>
        </div>

        <div class="form-group">
          <label>Idioma</label>
          <select class="form-control" id="cfg-lang">
            <option value="spa+eng">Español e Inglés</option>
            <option value="spa">Español</option>
            <option value="eng">Inglés</option>
          </select>
        </div>

        <div class="form-group">
          <label>Resolución</label>
          <select class="form-control" id="cfg-quality">
            <option value="printer">Alta (300 DPI)</option>
            <option value="ebook">Media (150 DPI)</option>
            <option value="screen">Baja (72 DPI)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Chunk Size</label>
          <input type="number" class="form-control" id="cfg-chunk-size" value="500">
        </div>
      </div>
    </details>

    <button class="btn-action" onclick="executeJob()">Procesar</button>

    <section class="result-card" id="result-card">
      <div class="result-header">
        <div class="result-title">Resultado</div>
        <span id="result-metrics" style="font-size:12px; color:var(--text-muted);"></span>
      </div>
      <div class="result-box" id="result-box"></div>
      <div class="action-row">
        <button class="btn-sm" onclick="copyResult()">Copiar</button>
        <button class="btn-sm" onclick="downloadResult()">Descargar</button>
      </div>
    </section>
  </main>

  <script>
    let selectedIntent = 'markdown';
    let selectedFile = null;
    let lastOutput = '';

    function selectIntent(intent, element) {
      selectedIntent = intent;
      document.querySelectorAll('.intent-card').forEach(c => c.classList.remove('selected'));
      element.classList.add('selected');
    }

    const fileInput = document.getElementById('file-input');
    const dropzone = document.getElementById('dropzone');
    const fileLabel = document.getElementById('file-label');

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        selectedFile = e.target.files[0];
        fileLabel.innerText = selectedFile.name;
      }
    });

    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('dragover'); });
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        selectedFile = e.dataTransfer.files[0];
        fileLabel.innerText = selectedFile.name;
      }
    });

    async function executeJob() {
      if (!selectedFile) {
        alert('Selecciona un archivo.');
        return;
      }

      const resultCard = document.getElementById('result-card');
      const resultBox = document.getElementById('result-box');
      const resultMetrics = document.getElementById('result-metrics');

      resultCard.style.display = 'block';
      resultBox.innerText = 'Procesando...';
      resultMetrics.innerText = '';

      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('engine', document.getElementById('cfg-engine').value);
      formData.append('lang', document.getElementById('cfg-lang').value);
      formData.append('chunk_size', document.getElementById('cfg-chunk-size').value);

      let endpoint = '/api/v1/process/markdown';
      if (selectedIntent === 'chunks') endpoint = '/api/v1/process/chunks';

      try {
        const start = Date.now();
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'X-API-Key': 'roa-dev-key-2024' },
          body: formData
        });

        if (!response.ok) throw new Error(`Error: ${response.statusText}`);

        const data = await response.json();
        const elapsed = ((Date.now() - start) / 1000).toFixed(2);
        resultMetrics.innerText = `${elapsed}s | ${data.pages || data.total_pages || 1} pág.`;

        if (selectedIntent === 'markdown') {
          lastOutput = data.full_markdown || 'Sin contenido.';
        } else if (selectedIntent === 'chunks') {
          lastOutput = JSON.stringify(data.chunks || [], null, 2);
        } else {
          lastOutput = JSON.stringify(data, null, 2);
        }

        resultBox.innerText = lastOutput;
      } catch (err) {
        resultBox.innerText = `Error: ${err.message}`;
      }
    }

    function copyResult() {
      navigator.clipboard.writeText(lastOutput);
    }

    function downloadResult() {
      const ext = selectedIntent === 'markdown' ? 'md' : 'json';
      let baseName = 'documento';
      if (selectedFile && selectedFile.name) {
        baseName = selectedFile.name.replace(/\.[^/.]+$/, "");
      }
      const outName = `${baseName}-roaOcr.${ext}`;
      const blob = new Blob([lastOutput], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = outName;
      a.click();
    }
  </script>
</body>
</html>
