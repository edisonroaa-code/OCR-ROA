name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ghostscript tesseract-ocr tesseract-ocr-spa poppler-utils
        
    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install ".[full,easyocr,dev]"
        
    - name: Run tests
      run: |
        pytest tests/ -v
